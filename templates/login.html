{% extends "base.html" %}

{% block title %}Admin Login | Smart Buy Hub{% endblock %}

{% block content %}
<section class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="content-card mt-4">
        <h1 class="section-title mb-3">Admin Login</h1>
        <p class="section-copy">This panel is only for catalog management.</p>
        <form method="post" class="mt-4">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control smart-input" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control smart-input" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary smart-btn w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
